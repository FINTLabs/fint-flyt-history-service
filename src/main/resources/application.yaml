fint:
  application-id: fint-flyt-history-service

novari:
  flyt:
    history-service:
      kafka:
        topic:
          instance-processing-events-retention-time: "4d"
      retention:
        time-to-keep-error-details-in-days: 60
        scrub-batch-size: 10000

server:
  max-http-request-header-size: 40KB
  error:
    include-message: always

spring:
  data:
    web:
      pageable:
        max-page-size: 1000
  jackson:
    time-zone: UTC
  jpa:
    open-in-view: false
  profiles:
    include:
      - flyt-kafka
      - flyt-logging
      - flyt-web-resource-server
      - flyt-postgres

  output:
    ansi:
      enabled: always
